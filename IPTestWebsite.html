<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問者追蹤示範</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #f5f5f5;
        }
        header {
            background-color: #4a76a8;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
        }
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            margin-top: 0;
        }
        #ip-info {
            font-size: 16px;
            margin-bottom: 10px;
        }
        #click-log {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .click-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .click-item:last-child {
            border-bottom: none;
        }
        .interactive-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .interactive-item {
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .interactive-item:hover {
            background-color: #dee2e6;
        }
        button {
            background-color: #4a76a8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #3a5a78;
        }
    </style>
</head>
<body>
    <header>
        <h1>訪問者追蹤示範</h1>
        <p>此頁面追蹤您的IP地址和點擊行為</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>IP 資訊</h2>
            <div id="ip-info">正在獲取您的IP資訊...</div>
            <button id="refresh-ip">重新獲取IP資訊</button>
        </div>

        <div class="card">
            <h2>點擊追蹤</h2>
            <div id="click-log">
                <p>您的點擊記錄將顯示在這裡</p>
            </div>
            <button id="clear-log">清除記錄</button>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2>互動區域</h2>
        <p>點擊以下元素來測試點擊追蹤功能：</p>
        
        <div class="interactive-area">
            <div class="interactive-item" id="item1">項目 1</div>
            <div class="interactive-item" id="item2">項目 2</div>
            <div class="interactive-item" id="item3">項目 3</div>
            <div class="interactive-item" id="item4">項目 4</div>
        </div>
    </div>

    <script>
        // 存儲IP信息
        let ipInfo = {};
        
        // 獲取IP信息
        async function getIPInfo() {
            try {
                // 使用ipify API獲取IP信息
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                
                // 獲取更詳細的IP信息
                const geoResponse = await fetch(`https://ipapi.co/${data.ip}/json/`);
                const geoData = await geoResponse.json();
                
                ipInfo = {
                    ip: data.ip,
                    city: geoData.city || 'Unknown',
                    region: geoData.region || 'Unknown',
                    country: geoData.country_name || 'Unknown',
                    isp: geoData.org || 'Unknown',
                    timestamp: new Date().toLocaleString()
                };
                
                // 更新UI
                displayIPInfo();
            } catch (error) {
                console.error('Error fetching IP information:', error);
                document.getElementById('ip-info').innerHTML = `
                    <p>無法獲取IP資訊。請檢查您的網絡連接或稍後再試。</p>
                    <p>錯誤: ${error.message}</p>
                `;
            }
        }
        
        // 顯示IP信息
        function displayIPInfo() {
            const ipInfoElement = document.getElementById('ip-info');
            ipInfoElement.innerHTML = `
                <p><strong>IP地址:</strong> ${ipInfo.ip}</p>
                <p><strong>位置:</strong> ${ipInfo.city}, ${ipInfo.region}, ${ipInfo.country}</p>
                <p><strong>ISP:</strong> ${ipInfo.isp}</p>
                <p><strong>時間:</strong> ${ipInfo.timestamp}</p>
            `;
        }
        
        // 點擊追蹤
        let clickLog = [];
        
        function trackClick(event) {
            // 獲取點擊元素的信息
            const target = event.target;
            const elementType = target.tagName.toLowerCase();
            const elementId = target.id || '無ID';
            const elementClass = target.className || '無類別';
            const elementText = target.textContent.trim().substring(0, 30) || '無文本';
            
            // 獲取點擊的坐標
            const x = event.clientX;
            const y = event.clientY;
            
            // 獲取頁面尺寸
            const pageWidth = document.documentElement.clientWidth;
            const pageHeight = document.documentElement.clientHeight;
            
            // 計算相對坐標（百分比）
            const relativeX = Math.round((x / pageWidth) * 100);
            const relativeY = Math.round((y / pageHeight) * 100);
            
            // 創建點擊記錄
            const clickInfo = {
                element: elementType,
                id: elementId,
                class: elementClass,
                text: elementText,
                coordinates: {
                    x: x,
                    y: y,
                    relativeX: relativeX,
                    relativeY: relativeY
                },
                timestamp: new Date().toLocaleString()
            };
            
            // 添加到日誌
            clickLog.unshift(clickInfo); // 在前面添加，以便最新的在頂部
            
            // 限制日誌大小
            if (clickLog.length > 50) {
                clickLog = clickLog.slice(0, 50);
            }
            
            // 更新UI
            updateClickLog();
        }
        
        // 更新點擊記錄顯示
        function updateClickLog() {
            const clickLogElement = document.getElementById('click-log');
            
            if (clickLog.length === 0) {
                clickLogElement.innerHTML = '<p>您的點擊記錄將顯示在這裡</p>';
                return;
            }
            
            let logHTML = '';
            clickLog.forEach((click, index) => {
                logHTML += `
                    <div class="click-item">
                        <strong>${index + 1}. 元素:</strong> ${click.element} 
                        ${click.id !== '無ID' ? `(ID: ${click.id})` : ''}
                        ${click.text !== '無文本' ? `- "${click.text}"` : ''}
                        <br>
                        <strong>坐標:</strong> X: ${click.coordinates.x}, Y: ${click.coordinates.y} 
                        (${click.coordinates.relativeX}%, ${click.coordinates.relativeY}%)
                        <br>
                        <strong>時間:</strong> ${click.timestamp}
                    </div>
                `;
            });
            
            clickLogElement.innerHTML = logHTML;
        }
        
        // 清除點擊記錄
        function clearClickLog() {
            clickLog = [];
            updateClickLog();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 獲取IP信息
            getIPInfo();
            
            // 添加全局點擊事件監聽器
            document.addEventListener('click', trackClick);
            
            // 為按鈕添加事件監聽器
            document.getElementById('refresh-ip').addEventListener('click', getIPInfo);
            document.getElementById('clear-log').addEventListener('click', clearClickLog);
        });
    </script>
</body>
</html>
