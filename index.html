<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問者追蹤系統 - Firebase版</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- 使用相容性模式的最新版本 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-600">訪問者追蹤系統</h1>
            <p class="text-gray-600 mt-2">使用Firebase記錄所有訪問者的IP信息</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 當前訪問者信息 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">當前訪問者資訊</h2>
                <div id="current-visitor" class="text-gray-700">
                    <p>正在獲取您的IP資訊...</p>
                </div>
            </div>

            <!-- 訪問者統計 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">訪問者統計</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <p class="text-sm text-blue-600">總訪問次數</p>
                        <p id="total-visits" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-lg">
                        <p class="text-sm text-green-600">獨立訪客</p>
                        <p id="unique-visitors" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-lg">
                        <p class="text-sm text-purple-600">今日訪問</p>
                        <p id="today-visits" class="text-2xl font-bold">0</p>
                    </div>
                </div>
                <div class="mt-4 flex space-x-3">
                    <button id="refresh-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">刷新數據</button>
                    <button id="clear-btn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded transition">清除數據</button>
                </div>
            </div>
        </div>

        <!-- 所有訪問者記錄 -->
        <div class="mt-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">所有訪問者記錄</h2>
            <div id="visitors-log" class="overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="py-2 px-4 border-b text-left">訪問時間</th>
                            <th class="py-2 px-4 border-b text-left">IP地址</th>
                            <th class="py-2 px-4 border-b text-left">位置</th>
                            <th class="py-2 px-4 border-b text-left">裝置</th>
                            <th class="py-2 px-4 border-b text-left">瀏覽器</th>
                        </tr>
                    </thead>
                    <tbody id="visitors-table">
                        <tr>
                            <td colspan="5" class="py-4 px-4 text-center text-gray-500">載入訪問記錄中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="error-message" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-lg"></div>
            <div id="debug-info" class="mt-4 p-4 bg-gray-100 text-gray-700 rounded-lg"></div>
        </div>
    </div>

    <script>
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBCqFqL-dZ9SyVDaSopSiuPkPb3RLeVc5A",
            authDomain: "iptrackwebsite.firebaseapp.com",
            databaseURL: "https://iptrackwebsite-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iptrackwebsite",
            storageBucket: "iptrackwebsite.firebasestorage.app",
            messagingSenderId: "755918103831",
            appId: "1:755918103831:web:5b94cc74f4fbfc808f8352"
        };

        // 調試信息顯示函數
        function logDebug(message) {
            const debugInfoEl = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugInfoEl.innerHTML += `<p>[${timestamp}] ${message}</p>`;
            console.log(`[${timestamp}] ${message}`);
        }

        // 初始化 Firebase
        logDebug("正在初始化 Firebase...");
        
        let app, database;
        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            logDebug("Firebase 初始化成功");
        } catch (error) {
            logDebug(`Firebase 初始化失敗: ${error.message}`);
            showError(`Firebase 初始化失敗: ${error.message}`);
        }

        // DOM 元素
        const currentVisitorEl = document.getElementById('current-visitor');
        const totalVisitsEl = document.getElementById('total-visits');
        const uniqueVisitorsEl = document.getElementById('unique-visitors');
        const todayVisitsEl = document.getElementById('today-visits');
        const visitorsTableEl = document.getElementById('visitors-table');
        const refreshBtn = document.getElementById('refresh-btn');
        const clearBtn = document.getElementById('clear-btn');
        const errorMessageEl = document.getElementById('error-message');

        // 獲取今日日期
        const today = new Date().toISOString().slice(0, 10);

        // 檢查Firebase連接
        database.ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                logDebug("已連接到 Firebase");
            } else {
                logDebug("與 Firebase 斷開連接");
                showError("無法連接到 Firebase 數據庫，請檢查網絡連接和配置。");
            }
        });

        // 備用IP獲取方法
        async function getIPWithBackups() {
            const ipServices = [
                'https://api.ipify.org?format=json',
                'https://api64.ipify.org?format=json',
                'https://ipinfo.io/json',
                'https://api.myip.com'
            ];

            for (const service of ipServices) {
                try {
                    logDebug(`嘗試從 ${service} 獲取IP...`);
                    const response = await fetch(service);
                    const data = await response.json();
                    
                    // 各種服務返回格式不同，需要適配
                    let ip;
                    if (data.ip) {
                        ip = data.ip;
                    } else if (data.IPv4) {
                        ip = data.IPv4;
                    }
                    
                    if (ip) {
                        logDebug(`成功獲取IP: ${ip}`);
                        return ip;
                    }
                } catch (error) {
                    logDebug(`從 ${service} 獲取IP失敗: ${error.message}`);
                }
            }

            // 所有方法都失敗，返回一個備用值以避免程序崩潰
            logDebug("所有IP獲取方法都失敗，使用本地IP");
            return "127.0.0.1";
        }

        // 獲取當前訪問者的IP信息
        async function getCurrentVisitorInfo() {
            try {
                // 使用備用IP獲取方法
                const ip = await getIPWithBackups();
                
                // 設置初始訪客數據
                let visitorData = {
                    ip: ip,
                    location: "未知位置",
                    browser: getBrowserInfo(),
                    device: getDeviceInfo(),
                    timestamp: Date.now(),  // 使用本地時間作為備用
                    date: today
                };

                // 顯示基本信息
                currentVisitorEl.innerHTML = `
                    <p><strong>IP地址:</strong> ${ip}</p>
                    <p><strong>位置:</strong> 獲取中...</p>
                    <p><strong>裝置:</strong> ${visitorData.device}</p>
                    <p><strong>瀏覽器:</strong> ${visitorData.browser}</p>
                    <p><strong>訪問時間:</strong> ${new Date().toLocaleString()}</p>
                `;

                // 嘗試獲取地理位置
                try {
                    // 使用更可靠的IP地理位置API
                    const geoResponse = await fetch(`https://ipapi.co/${ip}/json/`);
                    const geoData = await geoResponse.json();
                    
                    if (geoData && !geoData.error) {
                        visitorData.location = `${geoData.city || '未知'}, ${geoData.country_name || '未知'}`;
                        logDebug("地理位置獲取成功");
                    } else {
                        logDebug("地理位置API返回錯誤");
                    }
                } catch (geoError) {
                    logDebug(`地理位置獲取失敗: ${geoError.message}`);
                }

                // 使用服務器時間戳
                visitorData.timestamp = firebase.database.ServerValue.TIMESTAMP;

                // 更新顯示的位置信息
                currentVisitorEl.innerHTML = `
                    <p><strong>IP地址:</strong> ${ip}</p>
                    <p><strong>位置:</strong> ${visitorData.location}</p>
                    <p><strong>裝置:</strong> ${visitorData.device}</p>
                    <p><strong>瀏覽器:</strong> ${visitorData.browser}</p>
                    <p><strong>訪問時間:</strong> ${new Date().toLocaleString()}</p>
                `;

                // 將訪問者信息保存到 Firebase
                saveVisitorData(visitorData);

                return visitorData;
            } catch (error) {
                logDebug(`獲取IP信息失敗: ${error.message}`);
                currentVisitorEl.innerHTML = `<p class="text-red-500">獲取IP信息失敗: ${error.message}</p>`;
                showError(`獲取IP信息失敗: ${error.message}`);
                return null;
            }
        }

        // 保存訪問者數據到 Firebase
        function saveVisitorData(visitorData) {
            logDebug("正在保存訪問者數據...");
            
            // 創建一個新的訪問記錄
            const newVisitRef = database.ref('visits').push();
            
            // 處理IP地址，替換點（因為Firebase路徑不能包含.）
            const sanitizedIp = visitorData.ip.replace(/\./g, '_');
            
            // 獲取獨立訪客參照
            const visitorRef = database.ref('visitors').child(sanitizedIp);
            
            // 保存訪問記錄
            newVisitRef.set(visitorData)
                .then(() => {
                    logDebug("訪問記錄保存成功");
                    
                    // 更新獨立訪客記錄
                    return visitorRef.once('value');
                })
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        // 新訪客
                        logDebug("新訪客，創建記錄");
                        return visitorRef.set({
                            firstVisit: firebase.database.ServerValue.TIMESTAMP,
                            lastVisit: firebase.database.ServerValue.TIMESTAMP,
                            visits: 1
                        });
                    } else {
                        // 老訪客
                        logDebug("老訪客，更新記錄");
                        return visitorRef.update({
                            lastVisit: firebase.database.ServerValue.TIMESTAMP,
                            visits: (snapshot.val().visits || 0) + 1
                        });
                    }
                })
                .then(() => {
                    // 更新訪問計數器
                    updateVisitCounters();
                })
                .catch(error => {
                    logDebug(`保存訪問記錄失敗: ${error.message}`);
                    showError(`保存訪問記錄失敗: ${error.message}`);
                });
        }

        // 獲取瀏覽器信息
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = "未知";

            if (ua.indexOf("Firefox") > -1) {
                browser = "Firefox";
            } else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) {
                browser = "Opera";
            } else if (ua.indexOf("Edge") > -1 || ua.indexOf("Edg") > -1) {
                browser = "Edge";
            } else if (ua.indexOf("Chrome") > -1) {
                browser = "Chrome";
            } else if (ua.indexOf("Safari") > -1) {
                browser = "Safari";
            } else if (ua.indexOf("MSIE") > -1 || ua.indexOf("Trident") > -1) {
                browser = "Internet Explorer";
            }

            return browser;
        }

        // 獲取設備信息
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "桌面";

            if (/Android/i.test(ua)) {
                device = "Android";
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                device = "iOS";
            } else if (/Windows Phone/i.test(ua)) {
                device = "Windows Phone";
            } else if (/bot|crawler|spider|crawling/i.test(ua)) {
                device = "Bot/爬蟲";
            }

            return device;
        }

        // 更新訪問計數器
        function updateVisitCounters() {
            logDebug("正在更新訪問計數...");
            
            // 獲取總訪問次數
            database.ref('visits').once('value')
                .then(snapshot => {
                    const totalVisits = snapshot.exists() ? snapshot.numChildren() : 0;
                    totalVisitsEl.textContent = totalVisits;
                    logDebug(`總訪問次數: ${totalVisits}`);
                })
                .catch(error => logDebug(`獲取總訪問次數失敗: ${error.message}`));

            // 獲取獨立訪客數
            database.ref('visitors').once('value')
                .then(snapshot => {
                    const uniqueVisitors = snapshot.exists() ? snapshot.numChildren() : 0;
                    uniqueVisitorsEl.textContent = uniqueVisitors;
                    logDebug(`獨立訪客數: ${uniqueVisitors}`);
                })
                .catch(error => logDebug(`獲取獨立訪客數失敗: ${error.message}`));

            // 獲取今日訪問次數
            database.ref('visits').orderByChild('date').equalTo(today).once('value')
                .then(snapshot => {
                    const todayVisits = snapshot.exists() ? snapshot.numChildren() : 0;
                    todayVisitsEl.textContent = todayVisits;
                    logDebug(`今日訪問次數: ${todayVisits}`);
                })
                .catch(error => logDebug(`獲取今日訪問次數失敗: ${error.message}`));
        }

        // 加載訪問記錄
        function loadVisitorLogs() {
            logDebug("正在加載訪問記錄...");
            
            database.ref('visits').orderByChild('timestamp').limitToLast(100).once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        visitorsTableEl.innerHTML = `<tr><td colspan="5" class="py-4 px-4 text-center text-gray-500">沒有訪問記錄</td></tr>`;
                        logDebug("沒有訪問記錄");
                        return;
                    }

                    let html = '';
                    // 按照時間倒序顯示
                    const visits = [];
                    snapshot.forEach(childSnapshot => {
                        visits.push({ key: childSnapshot.key, data: childSnapshot.val() });
                    });

                    visits.reverse().forEach(visit => {
                        const data = visit.data;
                        // 使用本地時間作為備用，如果timestamp是服務器值則會是null
                        const timestamp = typeof data.timestamp === 'number' 
                            ? data.timestamp 
                            : (new Date().getTime());
                        const date = new Date(timestamp).toLocaleString();

                        html += `
                            <tr class="hover:bg-gray-50">
                                <td class="py-2 px-4 border-b">${date}</td>
                                <td class="py-2 px-4 border-b">${data.ip || '未知'}</td>
                                <td class="py-2 px-4 border-b">${data.location || '未知'}</td>
                                <td class="py-2 px-4 border-b">${data.device || '未知'}</td>
                                <td class="py-2 px-4 border-b">${data.browser || '未知'}</td>
                            </tr>
                        `;
                    });

                    visitorsTableEl.innerHTML = html;
                    logDebug(`已加載 ${visits.length} 條訪問記錄`);
                })
                .catch(error => {
                    logDebug(`加載訪問記錄失敗: ${error.message}`);
                    visitorsTableEl.innerHTML = `<tr><td colspan="5" class="py-4 px-4 text-center text-red-500">加載訪問記錄失敗: ${error.message}</td></tr>`;
                    showError(`加載訪問記錄失敗: ${error.message}`);
                });
        }

        // 顯示錯誤消息
        function showError(message) {
            errorMessageEl.textContent = message;
            errorMessageEl.classList.remove('hidden');
            setTimeout(() => {
                errorMessageEl.classList.add('hidden');
            }, 5000);
        }

        // 刷新按鈕點擊事件
        refreshBtn.addEventListener('click', () => {
            logDebug("手動刷新數據");
            getCurrentVisitorInfo();
            updateVisitCounters();
            loadVisitorLogs();
        });

        // 清除數據按鈕點擊事件
        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清除所有訪問記錄嗎？此操作無法撤銷！')) {
                logDebug("正在清除所有數據...");
                
                // 先清除訪問記錄
                database.ref('visits').remove()
                    .then(() => {
                        logDebug("訪問記錄已清除");
                        return database.ref('visitors').remove();
                    })
                    .then(() => {
                        logDebug("訪客記錄已清除");
                        
                        // 更新UI
                        totalVisitsEl.textContent = '0';
                        uniqueVisitorsEl.textContent = '0';
                        todayVisitsEl.textContent = '0';
                        visitorsTableEl.innerHTML = `<tr><td colspan="5" class="py-4 px-4 text-center text-gray-500">沒有訪問記錄</td></tr>`;
                        
                        alert('所有訪問記錄已清除！');
                        
                        // 清除後立即記錄當前訪問，確保功能恢復
                        setTimeout(() => {
                            logDebug("清除後重新記錄當前訪問");
                            getCurrentVisitorInfo();
                        }, 1000);
                    })
                    .catch(error => {
                        logDebug(`清除數據失敗: ${error.message}`);
                        showError(`清除數據失敗: ${error.message}`);
                    });
            }
        });

        // 頁面加載時執行
        window.addEventListener('DOMContentLoaded', () => {
            logDebug("頁面已載入，開始初始化系統");
            setTimeout(() => {
                getCurrentVisitorInfo();
                updateVisitCounters();
                loadVisitorLogs();
            }, 1000); // 延遲1秒，確保Firebase連接已建立
        });
    </script>
</body>
</html>
