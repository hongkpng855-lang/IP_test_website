<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問者追蹤系統</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #f5f5f5;
        }
        header {
            background-color: #4a76a8;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
        }
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        h1, h2 {
            margin-top: 0;
        }
        #current-ip-info {
            font-size: 16px;
            margin-bottom: 10px;
        }
        #visitors-log, #click-log {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .visitor-item, .click-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .visitor-item:last-child, .click-item:last-child {
            border-bottom: none;
        }
        .interactive-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .interactive-item {
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .interactive-item:hover {
            background-color: #dee2e6;
        }
        button {
            background-color: #4a76a8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #3a5a78;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-new {
            background-color: #28a745;
            color: white;
        }
        .status-returning {
            background-color: #17a2b8;
            color: white;
        }
        .tab-container {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        .tab {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-right: 5px;
        }
        .tab.active {
            background-color: white;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4a76a8;
            margin: 5px 0;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>訪問者追蹤系統</h1>
        <p>自動記錄所有訪問者的IP和點擊行為</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>當前訪問者資訊</h2>
            <div id="current-ip-info">正在獲取您的IP資訊...</div>
            <div id="visit-status"></div>
        </div>

        <div class="card">
            <div class="tab-container">
                <div class="tab active" data-tab="visitors">訪問者日誌</div>
                <div class="tab" data-tab="stats">統計數據</div>
            </div>
            
            <div class="tab-content active" id="visitors-tab">
                <div id="visitors-log">
                    <p>載入訪問記錄中...</p>
                </div>
            </div>
            
            <div class="tab-content" id="stats-tab">
                <div class="stats-container">
                    <div class="stat-box">
                        <div class="stat-label">總訪問次數</div>
                        <div class="stat-value" id="total-visits">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">獨立訪客</div>
                        <div class="stat-value" id="unique-visitors">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">今日訪問</div>
                        <div class="stat-value" id="today-visits">0</div>
                    </div>
                </div>
                <div id="stats-details">
                    <p>更多統計數據將在這裡顯示...</p>
                </div>
            </div>
            
            <button id="clear-visits-log">清除訪問記錄</button>
            <button id="export-data">導出數據</button>
        </div>
    </div>

    <div class="card">
        <h2>點擊追蹤</h2>
        <div id="click-log">
            <p>您的點擊記錄將顯示在這裡</p>
        </div>
        <button id="clear-click-log">清除點擊記錄</button>
    </div>

    <div class="card">
        <h2>互動區域</h2>
        <p>點擊以下元素來測試點擊追蹤功能：</p>
        
        <div class="interactive-area">
            <div class="interactive-item" id="item1">項目 1</div>
            <div class="interactive-item" id="item2">項目 2</div>
            <div class="interactive-item" id="item3">項目 3</div>
            <div class="interactive-item" id="item4">項目 4</div>
        </div>
    </div>

    <script>
        // 存儲訪問者和點擊數據
        let visitorsLog = [];
        let clickLog = [];
        let currentVisitor = {};
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            // 從本地存儲加載數據
            loadData();
            
            // 獲取並記錄當前訪問者的IP信息
            await getCurrentVisitorInfo();
            
            // 更新統計數據
            updateStats();
            
            // 添加全局點擊事件監聽器
            document.addEventListener('click', trackClick);
            
            // 為按鈕和標籤添加事件監聽器
            document.getElementById('clear-visits-log').addEventListener('click', clearVisitsLog);
            document.getElementById('clear-click-log').addEventListener('click', clearClickLog);
            document.getElementById('export-data').addEventListener('click', exportData);
            
            // 標籤切換功能
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    
                    // 更新標籤狀態
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    // 更新內容區域
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    document.getElementById(`${tabId}-tab`).classList.add('active');
                });
            });
        });
        
        // 從本地存儲加載數據
        function loadData() {
            try {
                const storedVisitors = localStorage.getItem('visitorsLog');
                const storedClicks = localStorage.getItem('clickLog');
                
                if (storedVisitors) {
                    visitorsLog = JSON.parse(storedVisitors);
                }
                
                if (storedClicks) {
                    clickLog = JSON.parse(storedClicks);
                }
                
                // 顯示加載的數據
                displayVisitorsLog();
                updateClickLog();
            } catch (error) {
                console.error('Error loading data from localStorage:', error);
            }
        }
        
        // 保存數據到本地存儲
        function saveData() {
            try {
                localStorage.setItem('visitorsLog', JSON.stringify(visitorsLog));
                localStorage.setItem('clickLog', JSON.stringify(clickLog));
            } catch (error) {
                console.error('Error saving data to localStorage:', error);
            }
        }
        
        // 獲取當前訪問者的IP信息
        async function getCurrentVisitorInfo() {
            try {
                // 使用ipify API獲取IP信息
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                
                // 獲取更詳細的IP信息
                const geoResponse = await fetch(`https://ipapi.co/${data.ip}/json/`);
                const geoData = await geoResponse.json();
                
                currentVisitor = {
                    ip: data.ip,
                    city: geoData.city || 'Unknown',
                    region: geoData.region || 'Unknown',
                    country: geoData.country_name || 'Unknown',
                    isp: geoData.org || 'Unknown',
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    language: navigator.language || 'Unknown',
                    screenSize: `${window.screen.width}x${window.screen.height}`,
                    referrer: document.referrer || 'Direct'
                };
                
                // 檢查是否為新訪問者
                const isNewVisitor = !visitorsLog.some(visitor => visitor.ip === currentVisitor.ip);
                const visitorStatus = isNewVisitor ? '新訪客' : '回訪者';
                const statusClass = isNewVisitor ? 'status-new' : 'status-returning';
                
                // 更新UI
                document.getElementById('current-ip-info').innerHTML = `
                    <p><strong>IP地址:</strong> ${currentVisitor.ip}</p>
                    <p><strong>位置:</strong> ${currentVisitor.city}, ${currentVisitor.region}, ${currentVisitor.country}</p>
                    <p><strong>ISP:</strong> ${currentVisitor.isp}</p>
                    <p><strong>時間:</strong> ${new Date(currentVisitor.timestamp).toLocaleString()}</p>
                    <p><strong>瀏覽器:</strong> ${getBrowserInfo(currentVisitor.userAgent)}</p>
                    <p><strong>來源:</strong> ${currentVisitor.referrer === 'Direct' ? '直接訪問' : currentVisitor.referrer}</p>
                `;
                
                document.getElementById('visit-status').innerHTML = `
                    <p>訪客狀態: <span class="status-badge ${statusClass}">${visitorStatus}</span></p>
                `;
                
                // 將當前訪問添加到日誌
                addVisitorToLog(currentVisitor, isNewVisitor);
                
            } catch (error) {
                console.error('Error fetching IP information:', error);
                document.getElementById('current-ip-info').innerHTML = `
                    <p>無法獲取IP資訊。請檢查您的網絡連接或稍後再試。</p>
                    <p>錯誤: ${error.message}</p>
                `;
            }
        }
        
        // 從用戶代理字符串提取瀏覽器信息
        function getBrowserInfo(userAgent) {
            let browser = 'Unknown';
            
            if (userAgent.includes('Firefox')) {
                browser = 'Firefox';
            } else if (userAgent.includes('Chrome') && !userAgent.includes('Edg')) {
                browser = 'Chrome';
            } else if (userAgent.includes('Safari') && !userAgent.includes('Chrome')) {
                browser = 'Safari';
            } else if (userAgent.includes('Edg')) {
                browser = 'Edge';
            } else if (userAgent.includes('MSIE') || userAgent.includes('Trident/')) {
                browser = 'Internet Explorer';
            }
            
            // 提取操作系統
            let os = 'Unknown';
            if (userAgent.includes('Windows')) {
                os = 'Windows';
            } else if (userAgent.includes('Mac')) {
                os = 'MacOS';
            } else if (userAgent.includes('Linux')) {
                os = 'Linux';
            } else if (userAgent.includes('Android')) {
                os = 'Android';
            } else if (userAgent.includes('iPhone') || userAgent.includes('iPad')) {
                os = 'iOS';
            }
            
            return `${browser} / ${os}`;
        }
        
        // 將訪問者添加到日誌
        function addVisitorToLog(visitor, isNew) {
            // 創建一個副本並添加標誌
            const visitorWithStatus = {
                ...visitor,
                isNewVisitor: isNew
            };
            
            // 添加到日誌
            visitorsLog.unshift(visitorWithStatus);
            
            // 限制日誌大小，保留最近100條記錄
            if (visitorsLog.length > 100) {
                visitorsLog = visitorsLog.slice(0, 100);
            }
            
            // 更新UI和保存數據
            displayVisitorsLog();
            updateStats();
            saveData();
        }
        
        // 顯示訪問者日誌
        function displayVisitorsLog() {
            const visitorsLogElement = document.getElementById('visitors-log');
            
            if (visitorsLog.length === 0) {
                visitorsLogElement.innerHTML = '<p>尚無訪問記錄</p>';
                return;
            }
            
            let logHTML = '';
            visitorsLog.forEach((visitor, index) => {
                const statusBadge = visitor.isNewVisitor 
                    ? '<span class="status-badge status-new">新訪客</span>' 
                    : '<span class="status-badge status-returning">回訪者</span>';
                
                logHTML += `
                    <div class="visitor-item">
                        <strong>${index + 1}. IP:</strong> ${visitor.ip} ${statusBadge}
                        <br>
                        <strong>位置:</strong> ${visitor.city}, ${visitor.country}
                        <br>
                        <strong>時間:</strong> ${new Date(visitor.timestamp).toLocaleString()}
                        <br>
                        <strong>設備:</strong> ${getBrowserInfo(visitor.userAgent)}
                    </div>
                `;
            });
            
            visitorsLogElement.innerHTML = logHTML;
        }
        
        // 更新統計數據
        function updateStats() {
            // 計算總訪問次數
            const totalVisits = visitorsLog.length;
            
            // 計算獨立訪客數
            const uniqueIPs = new Set(visitorsLog.map(visitor => visitor.ip));
            const uniqueVisitors = uniqueIPs.size;
            
            // 計算今天的訪問次數
            const today = new Date().toDateString();
            const todayVisits = visitorsLog.filter(visitor => {
                return new Date(visitor.timestamp).toDateString() === today;
            }).length;
            
            // 更新UI
            document.getElementById('total-visits').textContent = totalVisits;
            document.getElementById('unique-visitors').textContent = uniqueVisitors;
            document.getElementById('today-visits').textContent = todayVisits;
            
            // 更新詳細統計
            let statsHTML = '<h3>訪問者國家分布</h3>';
            
            // 計算國家分布
            const countryCounts = {};
            visitorsLog.forEach(visitor => {
                const country = visitor.country || 'Unknown';
                countryCounts[country] = (countryCounts[country] || 0) + 1;
            });
            
            // 排序國家分布
            const sortedCountries = Object.entries(countryCounts)
                .sort((a, b) => b[1] - a[1]);
            
            // 顯示國家分布
            statsHTML += '<ul>';
            sortedCountries.forEach(([country, count]) => {
                const percentage = Math.round((count / totalVisits) * 100);
                statsHTML += `<li><strong>${country}:</strong> ${count} 訪問 (${percentage}%)</li>`;
            });
            statsHTML += '</ul>';
            
            document.getElementById('stats-details').innerHTML = statsHTML;
        }
        
        // 點擊追蹤
        function trackClick(event) {
            // 獲取點擊元素的信息
            const target = event.target;
            const elementType = target.tagName.toLowerCase();
            const elementId = target.id || '無ID';
            const elementClass = target.className || '無類別';
            const elementText = target.textContent.trim().substring(0, 30) || '無文本';
            
            // 獲取點擊的坐標
            const x = event.clientX;
            const y = event.clientY;
            
            // 獲取頁面尺寸
            const pageWidth = document.documentElement.clientWidth;
            const pageHeight = document.documentElement.clientHeight;
            
            // 計算相對坐標（百分比）
            const relativeX = Math.round((x / pageWidth) * 100);
            const relativeY = Math.round((y / pageHeight) * 100);
            
            // 創建點擊記錄
            const clickInfo = {
                ip: currentVisitor.ip || 'Unknown',
                element: elementType,
                id: elementId,
                class: elementClass,
                text: elementText,
                coordinates: {
                    x: x,
                    y: y,
                    relativeX: relativeX,
                    relativeY: relativeY
                },
                timestamp: new Date().toISOString()
            };
            
            // 添加到日誌
            clickLog.unshift(clickInfo);
            
            // 限制日誌大小
            if (clickLog.length > 50) {
                clickLog = clickLog.slice(0, 50);
            }
            
            // 更新UI和保存數據
            updateClickLog();
            saveData();
        }
        
        // 更新點擊記錄顯示
        function updateClickLog() {
            const clickLogElement = document.getElementById('click-log');
            
            if (clickLog.length === 0) {
                clickLogElement.innerHTML = '<p>尚無點擊記錄</p>';
                return;
            }
            
            let logHTML = '';
            clickLog.forEach((click, index) => {
                logHTML += `
                    <div class="click-item">
                        <strong>${index + 1}. 元素:</strong> ${click.element} 
                        ${click.id !== '無ID' ? `(ID: ${click.id})` : ''}
                        ${click.text !== '無文本' ? `- "${click.text}"` : ''}
                        <br>
                        <strong>坐標:</strong> X: ${click.coordinates.x}, Y: ${click.coordinates.y} 
                        (${click.coordinates.relativeX}%, ${click.coordinates.relativeY}%)
                        <br>
                        <strong>時間:</strong> ${new Date(click.timestamp).toLocaleString()}
                    </div>
                `;
            });
            
            clickLogElement.innerHTML = logHTML;
        }
        
        // 清除訪問記錄
        function clearVisitsLog() {
            if (confirm('確定要清除所有訪問記錄嗎？此操作無法撤銷。')) {
                visitorsLog = [];
                displayVisitorsLog();
                updateStats();
                saveData();
            }
        }
        
        // 清除點擊記錄
        function clearClickLog() {
            if (confirm('確定要清除所有點擊記錄嗎？此操作無法撤銷。')) {
                clickLog = [];
                updateClickLog();
                saveData();
            }
        }
        
        // 導出數據
        function exportData() {
            try {
                const data = {
                    visitorsLog: visitorsLog,
                    clickLog: clickLog,
                    exportDate: new Date().toISOString(),
                    stats: {
                        totalVisits: visitorsLog.length,
                        uniqueVisitors: new Set(visitorsLog.map(visitor => visitor.ip)).size,
                    }
                };
                
                // 創建數據URL
                const dataStr = JSON.stringify(data, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const dataUrl = URL.createObjectURL(dataBlob);
                
                // 創建下載鏈接
                const downloadLink = document.createElement('a');
                downloadLink.href = dataUrl;
                downloadLink.download = `visitor-tracking-data-${new Date().toISOString().slice(0, 10)}.json`;
                
                // 模擬點擊
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                // 釋放URL
                URL.revokeObjectURL(dataUrl);
                
            } catch (error) {
                console.error('Error exporting data:', error);
                alert('導出數據時出錯: ' + error.message);
            }
        }
    </script>
</body>
</html>
